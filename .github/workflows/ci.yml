name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, analyze, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      DATABASE_URL: file:./dev.db
      SESSION_SECRET: ci-only-session-secret
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Prepare integration test database
        run: |
          npm run db:push
          npm run db:seed

      - name: Run integration tests
        run: |
          mkdir -p test-artifacts
          npm run dev > test-artifacts/next-server.log 2>&1 &
          server_pid=$!

          cleanup() {
            kill "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:3737/login > /dev/null; then
              break
            fi

            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat test-artifacts/next-server.log
              exit 1
            fi

            if [ "$attempt" -eq 60 ]; then
              cat test-artifacts/next-server.log
              exit 1
            fi

            sleep 1
          done

          npm run test:integration

      - name: Run unit tests with coverage
        run: npm test -- --coverage

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Run static analysis
        run: npm run analyze:static

      - name: Verify production build
        run: npm run build

      - name: Upload coverage report
        if: ${{ always() && hashFiles('coverage/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload static analysis reports
        if: ${{ always() && hashFiles('reports/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-${{ github.run_id }}
          path: reports/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload integration test logs
        if: ${{ always() && hashFiles('test-artifacts/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs-${{ github.run_id }}
          path: test-artifacts/
          if-no-files-found: ignore
          retention-days: 14
